spring.application.name=GymTrack

# ===============================
# PORTA (Render usa vari·vel PORT)
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE (Render ou local)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gymtrack_database}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:chave-dev-super-segura-123456789123456789123456789123456789}
jwt.expiration=604800000